server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy opcional para evitar problemas de CORS si se quisiera, 
    # pero lo manejaremos con variables de entorno por ahora.
}
