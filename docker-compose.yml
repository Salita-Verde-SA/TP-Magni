services:
  mongo:
    image: mongo:7.0
    container_name: tp7-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db

  api:
    build:
      context: ./server
    container_name: tp7-api
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGO_URL: mongodb://mongo:27017/registro-evento
      JWT_SECRET: ${JWT_SECRET:-jwt_secreto_tp7_desarrollo}
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000}
    container_name: tp7-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  mongo-data: